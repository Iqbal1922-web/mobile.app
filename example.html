<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4F46E5" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192x192.png">

  <title>MySchedule - Jadwal Kuliah Pintar</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

  <header class="header">
    <h1>📚 MySchedule</h1>
    <p>Kelola jadwal kuliahmu dengan mudah</p>
  </header>

  <main class="main">

    <!-- INPUT JADWAL -->
    <section class="card">
      <h2>Tambah Jadwal</h2>

      <input type="text" id="matkul" placeholder="Nama Mata Kuliah">
      <input type="text" id="hari" placeholder="Hari (Senin, Selasa...)">
      <input type="time" id="jam">

      <button onclick="tambahJadwal()">Tambah Jadwal</button>
    </section>

    <!-- LIST JADWAL -->
    <section class="card">
      <h2>Daftar Jadwal</h2>
      <ul id="listJadwal"></ul>
    </section>

  </main>

  <footer class="footer">
    <p>© 2026 MySchedule</p>
  </footer>

  <script>
    let jadwal = JSON.parse(localStorage.getItem("jadwal")) || [];

    function tambahJadwal() {
      let matkul = document.getElementById("matkul").value;
      let hari = document.getElementById("hari").value;
      let jam = document.getElementById("jam").value;

      if (matkul === "" || hari === "" || jam === "") {
        alert("Harap isi semua data!");
        return;
      }

      let data = { matkul, hari, jam };

      jadwal.push(data);

      // simpan ke localStorage (OFFLINE SUPPORT)
      localStorage.setItem("jadwal", JSON.stringify(jadwal));

      tampilkanJadwal();
      kirimNotifikasi(matkul);
    }

    function tampilkanJadwal() {
      let list = document.getElementById("listJadwal");
      list.innerHTML = "";

      jadwal.forEach((item) => {
        list.innerHTML += `
          <li>
            ${item.matkul} - ${item.hari} (${item.jam})
          </li>
        `;
      });
    }

    // NOTIFIKASI
    function kirimNotifikasi(matkul) {
      if (Notification.permission === "granted") {
        new Notification("Jadwal Ditambahkan", {
          body: matkul + " berhasil ditambahkan!"
        });
      }
    }

    // Minta izin notifikasi
    if ("Notification" in window) {
      Notification.requestPermission();
    }

    // LOAD DATA SAAT BUKA
    tampilkanJadwal();

    // SERVICE WORKER (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log("Service Worker aktif"))
        .catch(err => console.log("SW gagal:", err));
    }
  </script>

</body>

</html>
