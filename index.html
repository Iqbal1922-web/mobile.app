<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#6366f1" />
    <link rel="manifest" href="manifest.json">
    <title>MySchedule - Jadwal Kuliah Pintar</title>

    <style>
        /* CSS kamu tetap, tidak diubah */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #1856bb 100%);
            color: white;
            padding: 20px;
        }

        input,
        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #6366f1;
            color: white;
            cursor: pointer;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <h1>📚 MySchedule</h1>
    <p>Kelola jadwal kuliahmu dengan mudah</p>

    <!-- INPUT -->
    <div class="card">
        <h3>Tambah Jadwal</h3>

        <input type="text" id="matkulInput" placeholder="Mata Kuliah">
        <input type="text" id="hariInput" placeholder="Hari (Senin, Selasa)">
        <input type="time" id="jamInput">

        <button onclick="addTask()">Tambah Jadwal</button>
    </div>

    <!-- FILTER -->
    <div class="card">
        <button onclick="filterTasks('all')">Semua</button>
        <button onclick="filterTasks('senin')">Senin</button>
        <button onclick="filterTasks('selasa')">Selasa</button>
    </div>

    <!-- LIST -->
    <div id="tasksList"></div>

    <script>
        let tasks = [];
        let currentFilter = 'all';

        function loadTasks() {
            const saved = localStorage.getItem('myschedule');
            if (saved) {
                tasks = JSON.parse(saved);
                renderTasks();
            }
        }

        function saveTasks() {
            localStorage.setItem('myschedule', JSON.stringify(tasks));
        }

        function addTask() {
            const matkul = document.getElementById('matkulInput').value.trim();
            const hari = document.getElementById('hariInput').value.trim();
            const jam = document.getElementById('jamInput').value;

            if (matkul === '' || hari === '' || jam === '') {
                alert('Isi semua data!');
                return;
            }

            const data = {
                id: Date.now(),
                matkul,
                hari: hari.toLowerCase(),
                jam,
                completed: false
            };

            tasks.push(data);

            document.getElementById('matkulInput').value = '';
            document.getElementById('hariInput').value = '';
            document.getElementById('jamInput').value = '';

            saveTasks();
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            task.completed = !task.completed;
            saveTasks();
            renderTasks();
        }

        function filterTasks(filter) {
            currentFilter = filter;
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');

            let filtered = tasks;

            if (currentFilter !== 'all') {
                filtered = tasks.filter(t => t.hari === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = "<p>Tidak ada jadwal</p>";
                return;
            }

            container.innerHTML = filtered.map(task => `
                <div class="card">
                    <h3 style="${task.completed ? 'text-decoration:line-through' : ''}">
                        ${task.matkul}
                    </h3>
                    <p>📅 ${task.hari}</p>
                    <p>⏰ ${task.jam}</p>

                    <button onclick="toggleTask(${task.id})">
                        ${task.completed ? 'Batal' : 'Selesai'}
                    </button>
                    <button onclick="deleteTask(${task.id})">Hapus</button>
                </div>
            `).join('');
        }

        loadTasks();

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>

</body>

</html>
