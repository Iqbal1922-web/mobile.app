<script>
    let tasks = [];
    let currentFilter = 'all';
    let deferredPrompt;

    // ========================
    // LOCAL STORAGE
    // ========================
    function loadTasks() {
        const saved = localStorage.getItem('myschedule');
        if (saved) {
            tasks = JSON.parse(saved);
            renderTasks();
        }
    }

    function saveTasks() {
        localStorage.setItem('myschedule', JSON.stringify(tasks));
    }

    // ========================
    // CRUD
    // ========================
    function addTask() {
        const matkul = document.getElementById('matkulInput').value.trim();
        const hari = document.getElementById('hariInput').value;
        const jam = document.getElementById('jamInput').value;

        if (matkul === '' || hari === '' || jam === '') {
            alert('Isi semua data!');
            return;
        }

        const data = {
            id: Date.now(),
            matkul,
            hari,
            jam,
            completed: false
        };

        tasks.push(data);

        saveTasks();
        renderTasks();

        kirimNotifikasi(matkul);

        document.getElementById('matkulInput').value = '';
        document.getElementById('hariInput').value = '';
        document.getElementById('jamInput').value = '';
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderTasks();
    }

    function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        task.completed = !task.completed;
        saveTasks();
        renderTasks();
    }

    function filterTasks(filter) {
        currentFilter = filter;
        renderTasks();
    }

    function renderTasks() {
        const container = document.getElementById('tasksList');

        let filtered = tasks;

        if (currentFilter !== 'all') {
            filtered = tasks.filter(t => t.hari === currentFilter);
        }

        if (filtered.length === 0) {
            container.innerHTML = "<p>Tidak ada jadwal</p>";
            return;
        }

        container.innerHTML = filtered.map(task => `
            <div class="card">
                <h3 style="${task.completed ? 'text-decoration:line-through' : ''}">
                    ${task.matkul}
                </h3>
                <p>📅 ${task.hari}</p>
                <p>⏰ ${task.jam}</p>

                <button onclick="toggleTask(${task.id})">
                    ${task.completed ? 'Batal' : 'Selesai'}
                </button>
                <button onclick="deleteTask(${task.id})">Hapus</button>
            </div>
        `).join('');
    }

    // ========================
    // 🔔 NOTIFICATION
    // ========================
    function kirimNotifikasi(matkul) {
        if (Notification.permission === "granted") {
            new Notification("Jadwal Ditambahkan", {
                body: matkul + " berhasil ditambahkan!"
            });
        }
    }

    if ("Notification" in window) {
        Notification.requestPermission();
    }

    // ========================
    // 📲 INSTALL PWA
    // ========================
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
    });

    // ========================
    // 📤 SHARE TARGET HANDLER
    // ========================
    const params = new URLSearchParams(window.location.search);
    if (params.get("text") || params.get("title")) {
        alert("Data diterima: " + (params.get("text") || params.get("title")));
    }

    // ========================
    // 📂 FILE HANDLER
    // ========================
    if ('launchQueue' in window) {
        window.launchQueue.setConsumer(async (launchParams) => {
            if (launchParams.files.length > 0) {
                alert("File dibuka dari aplikasi!");
            }
        });
    }

    // ========================
    // 🔗 PROTOCOL HANDLER
    // ========================
    if (window.location.protocol === "web+myschedule:") {
        alert("Protocol MySchedule aktif!");
    }

    // ========================
    // 📡 WEB SHARE API DETECT
    // ========================
    if (navigator.share) {
        console.log("Web Share API aktif");
    }

    // ========================
    // LOAD DATA
    // ========================
    loadTasks();

    // ========================
    // SERVICE WORKER
    // ========================
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js')
            .then(() => console.log("Service Worker aktif"))
            .catch(err => console.log(err));
    }
</script>
